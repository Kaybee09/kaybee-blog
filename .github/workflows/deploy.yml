jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Check Node version
        run: node -v

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build